syntax = "proto3";

package relay;

service RelayHealth {
    rpc CheckHealth (HealthRequest) returns (HealthResponse) {}
}

message HealthRequest {}

message HealthResponse {
    string status = 1;
    int64 timestamp = 2;
    uint32 connected_clients = 3;
    double messages_per_second = 4;
    string version = 5;
}